name: Aido Test (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'Pull request number to analyze for tests and gaps'
        required: true
        type: number
      aido_ref:
        description: "Git ref of aido-dev/aido to run Aido from (remote install). Leave empty to use this repository's own copy of the scripts."
        required: false
        type: string
        default: ''
    secrets:
      CHATGPT_API_KEY:
        required: true
      GEMINI_API_KEY:
        required: true
      CLAUDE_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  aido-test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout Aido scripts (remote install)
        if: inputs.aido_ref != ''
        uses: actions/checkout@v7
        with:
          repository: aido-dev/aido
          ref: ${{ inputs.aido_ref }}
          path: .aido-remote

      - name: Resolve scripts directory
        id: aido
        env:
          AIDO_REF: ${{ inputs.aido_ref }}
        run: |
          if [ -n "$AIDO_REF" ]; then
            # Remote install: run scripts from the aido-dev/aido checkout, but let
            # this repository's config files (if any) override the shipped defaults.
            if [ -d .github/scripts ]; then
              find .github/scripts -maxdepth 2 -name 'aido-*-config.json' -exec cp --parents {} .aido-remote/ \;
            fi
            echo "scripts=.aido-remote/.github/scripts" >> "$GITHUB_OUTPUT"
          else
            echo "scripts=.github/scripts" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install dependencies for Aido Test
        run: |
          npm install openai@latest @octokit/rest @google/generative-ai @anthropic-ai/sdk

      - name: Create synthetic GitHub event (PR context)
        run: |
          EVENT_FILE="$RUNNER_TEMP/aido_event.json"
          echo "{\"pull_request\":{\"number\": \"${{ inputs.pr_number }}\"}}" > "$EVENT_FILE"
          echo "EVENT_FILE=$EVENT_FILE" >> $GITHUB_ENV

      - name: Run Aido Test (generate test cases and identify gaps)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHATGPT_API_KEY: ${{ secrets.CHATGPT_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GITHUB_EVENT_PATH: ${{ env.EVENT_FILE }}
        run: node ${{ steps.aido.outputs.scripts }}/test/aido-test.js
